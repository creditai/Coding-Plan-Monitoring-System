name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'CPMS v__VERSION__'
          releaseBody: |
            ## CPMS - Coding Plan Monitoring System v__VERSION__

            ### Downloads
            - **Windows**: `.msi` installer or `.exe` (x64)
            - **macOS**: `.dmg` (Apple Silicon or Intel)
            - **Linux**: `.deb` or `.AppImage` (x64)

            ### Supported Providers
            - Zhipu GLM (Pay-as-you-go)
            - GLM Coding Plan (z.ai)
            - MiniMax (CN / Global)
            - DeepSeek

            ### What's New
            - First public release
            - Real-time multi-provider API monitoring
            - Glassmorphism floating widget
            - Consumption prediction engine
            - Bilingual UI (Chinese/English)

          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
